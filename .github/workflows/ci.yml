# .github/workflows/ci.yml
# Minimal CI for Phase 2 foundation. Expands in Phase 4.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            dashboard/deps
            dashboard/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('dashboard/mix.lock') }}

      - name: Install deps
        run: |
          cd dashboard
          mix deps.get --only test

      - name: Check formatting
        run: cd dashboard && mix format --check-formatted

      - name: Run tests
        run: cd dashboard && mix test

      - name: Credo (non-strict in CI for Phase 2)
        run: cd dashboard && mix credo || true

      # Future: build Nerves firmware, ESP-IDF compile checks, dialyzer
