# Mosquitto config for Phase 2 demo
# !!! SECURITY WARNING (demo only) !!!
# allow_anonymous + no ACLs = open telemetry/command surface.
# Real deployments MUST use auth + ACLs (per-device topics, read/write separation).
# See docs/PHASE1... §3 and Phase 4 notes. This is intentionally open for the one-command demo.
listener 1883
protocol mqtt
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
# Retained messages for status topics (LWT)
# No max retained etc for demo
